server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/queen_pharmacy
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB

jwt:
  secret: queen-pharmacy-jwt-secret-key-2024-very-long-secret-for-security-purposes
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

google:
  client-id: YOUR_GOOGLE_CLIENT_ID

# Allowed CORS origins (comma-separated). Use * for development.
cors:
  allowed-origins: "https://admin.queeny-pharmacy.online"
