version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: queen-pharmacy-db
    environment:
      POSTGRES_DB: queen_pharmacy
      POSTGRES_USER: fathy
      POSTGRES_PASSWORD: fathy232028
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fathy -d queen_pharmacy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: queen-pharmacy-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/queen_pharmacy
      SPRING_DATASOURCE_USERNAME: fathy
      SPRING_DATASOURCE_PASSWORD: fathy232028
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  backend-network:
    driver: bridge
